<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avenit — wkrótce</title>
  <meta name="description" content="Avenit — system do zarządzania kościołem. Strona w budowie." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(1200px 600px at 50% -10%, #3a2a12 0%, #0f172a 55%);
      color: #e2e8f0; text-align: center; padding: 24px;
    }
    .wrap { max-width: 560px; }
    .logo {
      font-size: 42px; font-weight: 800; letter-spacing: -0.02em;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 20px;
    }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 14px; }
    p { color: #94a3b8; font-size: 16px; line-height: 1.6; margin-bottom: 28px; }
    .cta {
      display: inline-block; padding: 12px 24px; border-radius: 10px;
      background: #d97706; color: #fff; text-decoration: none; font-weight: 600;
      transition: opacity .2s;
    }
    .cta:hover { opacity: .9; }
    .foot { margin-top: 40px; color: #475569; font-size: 13px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo">Avenit</div>
    <h1>Strona wkrótce</h1>
    <p>Pracujemy nad stroną Avenit — systemu do zarządzania kościołem.<br>Jesteś użytkownikiem? Zaloguj się do swojego kościoła.</p>
    <a class="cta" href="https://app.avenit.pl">Zaloguj się →</a>
    <div class="foot">© Avenit</div>
  </div>
</body>
</html>
