<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Avenit — logowanie</title>
  <meta name="description" content="Zaloguj się do swojego kościoła w Avenit." />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(1200px 600px at 50% -10%, #3a2a12 0%, #0f172a 55%);
      color: #e2e8f0; padding: 24px;
    }
    .card {
      width: 100%; max-width: 420px; background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 32px;
    }
    .logo {
      font-size: 30px; font-weight: 800; letter-spacing: -0.02em; text-align: center;
      background: linear-gradient(135deg, #f59e0b, #d97706);
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    h1 { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 4px; }
    .sub { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 24px; }
    label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 6px; }
    .field { display: flex; align-items: stretch; border: 1px solid #334155; border-radius: 10px; overflow: hidden; background: #0f172a; }
    .field input {
      flex: 1; background: transparent; border: none; color: #e2e8f0; padding: 12px 14px;
      font-size: 16px; outline: none; min-width: 0;
    }
    .field .suffix { display: flex; align-items: center; padding: 0 14px; color: #64748b; background: #0b1220; font-size: 15px; white-space: nowrap; }
    button {
      width: 100%; margin-top: 18px; padding: 13px; border: none; border-radius: 10px;
      background: #d97706; color: #fff; font-weight: 700; font-size: 16px; cursor: pointer;
      transition: opacity .2s;
    }
    button:hover { opacity: .9; }
    .err { color: #f87171; font-size: 13px; margin-top: 10px; min-height: 18px; text-align: center; }
    .hint { color: #64748b; font-size: 13px; text-align: center; margin-top: 18px; }
    .hint a { color: #f59e0b; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Avenit</div>
    <h1>Zaloguj się do swojego kościoła</h1>
    <div class="sub">Podaj adres swojego kościoła</div>

    <form id="f">
      <label for="slug">Adres kościoła</label>
      <div class="field">
        <input id="slug" name="slug" autocomplete="off" autocapitalize="off" autocorrect="off"
               spellcheck="false" placeholder="np. schwro" autofocus />
        <div class="suffix">.avenit.pl</div>
      </div>
      <button type="submit">Przejdź do logowania →</button>
      <div class="err" id="err"></div>
    </form>

    <div class="hint">Administrator platformy? <a href="https://admin.avenit.pl">Panel administracyjny</a></div>
  </div>

  <script>
    var BASE_DOMAIN = 'avenit.pl';
    var RESERVED = ['admin', 'api', 'app', 'www'];
    var form = document.getElementById('f');
    var input = document.getElementById('slug');
    var err = document.getElementById('err');

    // Pamiętaj ostatnio wybrany kościół.
    try {
      var last = localStorage.getItem('avenit.lastChurch');
      if (last) input.value = last;
    } catch (e) {}

    function normalize(v) {
      return (v || '').trim().toLowerCase()
        .replace(/^https?:\/\//, '')
        .replace(/\.avenit\.pl.*$/, '')
        .replace(/[^a-z0-9-]/g, '');
    }

    form.addEventListener('submit', function (e) {
      e.preventDefault();
      err.textContent = '';
      var slug = normalize(input.value);
      if (!slug) { err.textContent = 'Wpisz adres swojego kościoła.'; return; }
      if (RESERVED.indexOf(slug) !== -1) { err.textContent = 'Ten adres jest zarezerwowany.'; return; }
      try { localStorage.setItem('avenit.lastChurch', slug); } catch (e) {}
      window.location.href = 'https://' + slug + '.' + BASE_DOMAIN + '/';
    });
  </script>
</body>
</html>
